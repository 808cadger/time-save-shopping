name: Auto CLAUDE.md
on:
  push:
    branches: [main]
jobs:
  setup-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Generate CLAUDE.md
      run: |
        cat > CLAUDE.md << 'MDEOF'
# CLAUDE.md

## Project Overview

- **Purpose**: Agentic AI applications for fraud detection, facial recognition, and automation workflows targeting production deployment
- **Tech stack**: Python 3.11+, LangChain/LangGraph/LangSmith, FastAPI, Pydantic v2, SQLAlchemy/PostgreSQL, Celery
- **Entry points**:
  - Agents: `./agents/` (agent definitions, tools, orchestration graphs)
  - Core logic: `./src/` (business logic, models, utilities)
  - APIs: `./api/` (FastAPI endpoints)
  - Tests: `./tests/` (unit/integration/agent tests)
  - Prompts: `./prompts/` (Jinja2 templates for agent instructions)
- **Target environment**:
  - Runtime: Python 3.11+, Poetry dependency management
  - Deployment: Docker → Railway/Fly.io/Render
  - Monitoring: LangSmith traces + Sentry

**Primary goals**: Secure, production-ready agents with clear input/output contracts, comprehensive testing, and minimal vendor lock-in.

## Commit Message Format

```
Summary
Fixed: [what broke]

Added: [new capability]

Impact: [breaking changes or migration needed]
```

## Security First

- Never hardcode secrets/API keys (use `python-dotenv`)
- Validate all inputs with Pydantic
- No `eval()` or `exec()` unless explicitly approved
- Use `logging` not `print()` for production code

## Python Style Guide

**Follow PEP 8 + these preferences:**

- Type hints: Always on public APIs, functions, classes
- Async: Use async/await for I/O (FastAPI, DB calls)
- Packages: poetry preferred, pip/requirements.txt fallback
- Logging: structlog or logging.config
- Docstrings: Google or NumPy style

**Agent-specific:**

- Store prompts in `./prompts/` as `.jinja2` files
- Tools get type hints and docstrings
- Never call external APIs without explicit error handling
- Use `tenacity` for retries, not custom loops

## Commands Claude Should Know

```bash
# Development
poetry install
poetry run pre-commit install
poetry run pytest tests/
poetry run black .
poetry run ruff check .

# Agent testing
poetry run python agents/test_runner.py

# Docker
docker build -t agentic-app .
docker run -p 8000:8000 agentic-app
```

## Testing Requirements

Every change needs:

```
tests/test_[feature].py          # Unit tests
tests/integration/test_[agent].py  # Agent workflows
```

Agent tests must include:

```python
def test_agent_smoke():
    result = agent.run("test query")
    assert result["status"] == "success"
```

## Git Workflow

```
feat: add agent X
fix: resolve Y bug
refactor: improve Z performance
docs: update agent docs

Co-authored-by: Claude <claude@example.com>
```

## Prohibited Actions

Claude must never:

- Delete working code without replacement
- Add untested agent logic
- Use `print()` in production paths
- Generate infinite loops or unbounded recursion
- Access external URLs without explicit permission

## GitHub Compliance

This repo follows GitHub's Terms of Service. Claude-generated code must not:

- Scrape data without permission
- Generate spam/abuse
- Violate third-party ToS
- Include malicious code

## Quick Reference for Claude

When asked to "fix this":

1. Read the existing code carefully
2. Identify the specific failure
3. Make minimal targeted changes
4. Add test proving the fix
5. Explain what/why in comments

**Goal: Make agents production-ready, secure, and maintainable.**
MDEOF
    - name: Commit CLAUDE.md
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Add CLAUDE.md with project guidelines"
        file_pattern: CLAUDE.md
